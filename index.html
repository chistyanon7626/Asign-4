<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
      <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400..800&family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
</head>
<body class="bg-[#F8FAFC] min-h-screen">
  <!--Header section-->
 <div class="max-w-6xl mx-auto px-4 pt-14">
  <header class="flex flex-col">
    <div class="mx-auto w-full">
          <div class="flex justify-between items-center">
            <h2 class="font-bold text-[32px] text-[#002c5c]">
              Job Application Tracker
            </h2>
         
          </div>
          <!-- Job Application Tracker card-->
            <div
            id="cards-container"
            class="mt-5 grid gap-5 grid-cols-1 sm:grid-cols-2 md:grid-cols-3 auto-rows-fr">
            <div
              class="card bg-base-100 shadow-sm flex flex-col justify-center p-5">
              <h2 class="card-title text-[#002c5c]">Interviews</h2>
              <p id="interviews-counter"class="text-[#10b981] font-bold text-2xl"> 0</p>
            </div>
            <div
              class="card bg-base-100 shadow-sm flex flex-col justify-center p-5">
              <h2 class="card-title text-[#002c5c]">Total</h2>
              <p id="total-counter" class="text-[#002c5c] font-bold text-2xl"> 8</p>
            </div>
            <div
              class="card bg-base-100 shadow-sm flex flex-col justify-center p-5">
              <h2 class="card-title text-[#002c5c]">Rejected</h2>
              <p id="rejected-counter" class="text-red-600 font-bold text-2xl">0</p>
            </div>
          </div>
        </div>
      </header>

  </header>

   

 </div>
</body>
</html>
